providers = ["node"]

[variables]
NEXT_TELEMETRY_DISABLED = "1"
NODE_ENV = "production"

[phase.setup]
nixPkgs = []
nodeVersion = "22"

[phase.build]
cmds = ["npm ci", "npm run build", "cp -r .next/static .next/standalone/.next/static", "mkdir -p .next/standalone/public && cp -r public/. .next/standalone/public/ 2>/dev/null || true"]

[start]
cmd = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
