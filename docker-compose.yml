services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myperformance_dashboard
    restart: always
    environment:
      - NEXTAUTH_URL=https://myperformance.pl
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - KEYCLOAK_URL=https://auth.myperformance.pl
      - KEYCLOAK_REALM=MyPerformance
      - KEYCLOAK_CLIENT_ID=myperformance-dashboard
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_SERVICE_CLIENT_ID=myperformance-service
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET}
      - KEYCLOAK_WEBHOOK_SECRET=${KEYCLOAK_WEBHOOK_SECRET}
      - GOOGLE_IDP_CLIENT_ID=${GOOGLE_IDP_CLIENT_ID}
      - GOOGLE_IDP_CLIENT_SECRET=${GOOGLE_IDP_CLIENT_SECRET}
      - NEXT_PUBLIC_APP_URL=https://myperformance.pl
      - NEXT_PUBLIC_KEYCLOAK_URL=https://auth.myperformance.pl
      - NEXT_PUBLIC_KEYCLOAK_REALM=MyPerformance
    networks:
      - proxy-network
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`myperformance.pl`) || Host(`www.myperformance.pl`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/auth/session || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy-network:
    external: true
  backend:
    external: true
    name: myperformance_backend
