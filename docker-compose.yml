services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://myperformance.pl}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-https://auth.myperformance.pl}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-MyPerformance}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-dev}
    container_name: myperformance_dashboard
    restart: always
    env_file:
      - .env
    environment:
      # Only values that must always be container-runtime-specific go here.
      # Everything else is loaded from .env (above) or overridden by Coolify.
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://myperformance.pl}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://myperformance.pl}
      - NEXT_PUBLIC_KEYCLOAK_URL=${NEXT_PUBLIC_KEYCLOAK_URL:-https://auth.myperformance.pl}
      - NEXT_PUBLIC_KEYCLOAK_REALM=${NEXT_PUBLIC_KEYCLOAK_REALM:-MyPerformance}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-https://auth.myperformance.pl}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-MyPerformance}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-myperformance-dashboard}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID:-myperformance-service}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - proxy-network
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`myperformance.pl`) || Host(`www.myperformance.pl`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

networks:
  proxy-network:
    external: true
  backend:
    external: true
    name: myperformance_backend
