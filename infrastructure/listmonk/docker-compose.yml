services:
  listmonk:
    image: 'listmonk/listmonk:latest'
    environment:
      - SERVICE_FQDN_LISTMONK_9000=mail.myperformance.pl
      - TZ=Europe/Warsaw
      - 'LISTMONK_app__address=0.0.0.0:9000'
      - 'LISTMONK_app__root_url=https://mail.myperformance.pl'
      - 'LISTMONK_app__admin_username=${SERVICE_USER_ADMIN}'
      - 'LISTMONK_app__admin_password=${SERVICE_PASSWORD_ADMIN}'
      - 'LISTMONK_db__host=postgres'
      - 'LISTMONK_db__port=5432'
      - 'LISTMONK_db__user=${SERVICE_USER_POSTGRES}'
      - 'LISTMONK_db__password=${SERVICE_PASSWORD_POSTGRES}'
      - 'LISTMONK_db__database=listmonk'
      - 'LISTMONK_db__ssl_mode=disable'
    volumes:
      - 'listmonk-uploads:/listmonk/uploads'
    depends_on:
      postgres:
        condition: service_healthy
    command: ['sh', '-c', './listmonk --install --idempotent --yes --config "" && ./listmonk --upgrade --yes --config "" && ./listmonk --config ""']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:9000/api/health >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_USER=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=listmonk
    volumes:
      - 'listmonk-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 10s
      retries: 12
