# knowledge.myperformance.pl — Outline wiki (Keycloak SSO)
#
# TODO (network-segmentation §3): migrate
#   outline app    → mp_auth + mp_data_outline
#   postgres/redis → mp_data_outline (internal: true)
# Patrz infrastructure/network-segmentation.md
#
# Clean reinstall (2026-04):
#   - Fresh Postgres + Redis
#   - OIDC od pierwszego startu (client_id=outline)
#   - Rola globalna mapowana z realm role przez OIDC_ROLES_CLAIM na
#     viewer/member/admin — patrz realm.json protocol mapper "outline-role"

services:
  postgres:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: ${OUTLINE_DB_PASSWORD}
      POSTGRES_DB: outline
    volumes:
      - 'outline-db:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U outline']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  redis:
    image: 'redis:7-alpine'
    restart: unless-stopped
    volumes:
      - 'outline-redis:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  outline:
    image: 'outlinewiki/outline:0.83.0'
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # === Core ===
      URL: https://knowledge.myperformance.pl
      PORT: '3000'
      SECRET_KEY: ${OUTLINE_SECRET_KEY}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET}
      PGSSLMODE: disable

      # === Storage ===
      DATABASE_URL: postgres://outline:${OUTLINE_DB_PASSWORD}@postgres:5432/outline
      REDIS_URL: redis://redis:6379
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data
      FILE_STORAGE_UPLOAD_MAX_SIZE: '262144000'

      # === Keycloak OIDC (native generic OIDC) ===
      OIDC_CLIENT_ID: outline
      OIDC_CLIENT_SECRET: ${OUTLINE_OIDC_CLIENT_SECRET}
      OIDC_AUTH_URI: https://auth.myperformance.pl/realms/MyPerformance/protocol/openid-connect/auth
      OIDC_TOKEN_URI: https://auth.myperformance.pl/realms/MyPerformance/protocol/openid-connect/token
      OIDC_USERINFO_URI: https://auth.myperformance.pl/realms/MyPerformance/protocol/openid-connect/userinfo
      OIDC_LOGOUT_URI: https://auth.myperformance.pl/realms/MyPerformance/protocol/openid-connect/logout
      OIDC_USERNAME_CLAIM: preferred_username
      OIDC_DISPLAY_NAME: 'MyPerformance ID'
      OIDC_SCOPES: 'openid profile email'
      # Domyślna rola JIT — Outline ustawia ją gdy claim `roles` jest
      # pusty. `member` dla standardowego dostępu; admin z realm-roli.
      OIDC_DEFAULT_USER_ROLE: member

      # === Locale ===
      DEFAULT_LANGUAGE: pl_PL
      FORCE_HTTPS: 'true'

      # === SMTP (Postal relay) ===
      SMTP_HOST: ${SMTP_HOST:-smtp-iut9wf1rz9ey54g7lbkje0je}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_SECURE: 'false'
      SMTP_FROM_EMAIL: noreply@myperformance.pl
      SMTP_REPLY_EMAIL: noreply@myperformance.pl
    expose:
      - '3000'
    volumes:
      - 'outline-data:/var/lib/outline/data'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/_health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

volumes:
  outline-db:
  outline-redis:
  outline-data:
