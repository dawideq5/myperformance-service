services:
  chatwoot-rails:
    image: 'chatwoot/chatwoot:v4.1.0'
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    environment:
      - SERVICE_FQDN_CHATWOOT_3000=chat.myperformance.pl
      - 'FRONTEND_URL=${SERVICE_URL_CHATWOOT}'
      - FORCE_SSL=true
      - ENABLE_ACCOUNT_SIGNUP=false
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - 'SECRET_KEY_BASE=${SERVICE_BASE64_128_SECRETKEY}'
      - 'POSTGRES_HOST=postgres'
      - 'POSTGRES_USERNAME=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DATABASE=chatwoot
      - 'REDIS_URL=redis://redis:6379'
      - 'REDIS_PASSWORD=${SERVICE_PASSWORD_REDIS}'
      - 'RAILS_INBOUND_EMAIL_SERVICE=relay'
      - 'MAILER_SENDER_EMAIL=Chatwoot <no-reply@myperformance.pl>'
      - 'SMTP_ADDRESS=${SMTP_ADDRESS:-}'
      - 'SMTP_PORT=${SMTP_PORT:-587}'
      - 'SMTP_USERNAME=${SMTP_USERNAME:-}'
      - 'SMTP_PASSWORD=${SMTP_PASSWORD:-}'
      - 'SMTP_DOMAIN=${SMTP_DOMAIN:-myperformance.pl}'
      - 'ACTIVE_STORAGE_SERVICE=local'
    volumes:
      - 'chatwoot-storage:/app/storage'
      - 'chatwoot-public:/app/public'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
  chatwoot-sidekiq:
    image: 'chatwoot/chatwoot:v4.1.0'
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - 'SECRET_KEY_BASE=${SERVICE_BASE64_128_SECRETKEY}'
      - 'FRONTEND_URL=${SERVICE_URL_CHATWOOT}'
      - 'POSTGRES_HOST=postgres'
      - 'POSTGRES_USERNAME=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DATABASE=chatwoot
      - 'REDIS_URL=redis://redis:6379'
      - 'REDIS_PASSWORD=${SERVICE_PASSWORD_REDIS}'
    volumes:
      - 'chatwoot-storage:/app/storage'
    depends_on:
      chatwoot-rails:
        condition: service_healthy
  postgres:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_USER=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=chatwoot
    volumes:
      - 'chatwoot-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 10s
      retries: 12
  redis:
    image: 'redis:7-alpine'
    command: 'redis-server --requirepass ${SERVICE_PASSWORD_REDIS} --appendonly yes'
    volumes:
      - 'chatwoot-redis-data:/data'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $${SERVICE_PASSWORD_REDIS} ping | grep -q PONG']
      interval: 5s
      timeout: 10s
      retries: 12
