# sign.myperformance.pl — Documenso z Keycloak SSO
#
# Clean reinstall (2026-04):
#   - Fresh Postgres (zero dokumentów, zero podpisów, zero team/org)
#   - OIDC od pierwszego startu
#   - Self-signed cert.p12 generowany przez entrypoint (dev-mode;
#     prod wymaga wgrania .p12 od kwalifikowanego CA przez /admin)
#   - Nginx sidecar redirektuje / → OIDC signin (żadnego password form
#     dla nowych userów, chyba że admin włączy)
#
# Po deployu:
#   1. Deploy stack → Documenso uruchamia własne prisma migrations przy
#      starcie (OK — to migracje SCHEMY, nie danych)
#   2. Zaloguj się przez SSO jako user z rolą realm `documenso_admin`
#   3. W /admin stwórz główną Organisation — skopiuj jej UUID do
#      `DOCUMENSO_ORGANISATION_ID` w envach dashboardu
#   4. (Opcjonalnie) stwórz Team wewnątrz Org, skopiuj jego int ID do
#      `DOCUMENSO_TEAM_ID`

services:
  frontdoor:
    image: 'nginx:1.27-alpine'
    restart: unless-stopped
    depends_on:
      documenso:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_FRONTDOOR_3000=sign.myperformance.pl
    expose:
      - '3000'
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf:ro'
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q -O - http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  documenso:
    image: 'documenso/documenso:1.7.0'
    restart: unless-stopped
    user: '0:0'
    depends_on:
      database:
        condition: service_healthy
    environment:
      - 'NEXTAUTH_URL=${SERVICE_URL_DOCUMENSO}'
      - 'NEXTAUTH_SECRET=${SERVICE_BASE64_AUTHSECRET}'
      - 'NEXT_PRIVATE_ENCRYPTION_KEY=${SERVICE_BASE64_ENCRYPTIONKEY}'
      - 'NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=${SERVICE_BASE64_SECONDARYENCRYPTIONKEY}'
      - 'NEXT_PUBLIC_WEBAPP_URL=${SERVICE_URL_DOCUMENSO}'
      - 'NEXT_PUBLIC_UPLOAD_TRANSPORT=${NEXT_PRIVATE_UPLOAD_TRANSPORT:-database}'
      - 'NEXT_PUBLIC_DISABLE_SIGNUP=${NEXT_PUBLIC_DISABLE_SIGNUP:-true}'

      # === SMTP (Postal relay) ===
      - 'NEXT_PRIVATE_SMTP_TRANSPORT=${NEXT_PRIVATE_SMTP_TRANSPORT:-smtp}'
      - 'NEXT_PRIVATE_SMTP_HOST=${NEXT_PRIVATE_SMTP_HOST}'
      - 'NEXT_PRIVATE_SMTP_PORT=${NEXT_PRIVATE_SMTP_PORT:-465}'
      - 'NEXT_PRIVATE_SMTP_SECURE=${NEXT_PRIVATE_SMTP_SECURE:-true}'
      - 'NEXT_PRIVATE_SMTP_USERNAME=${NEXT_PRIVATE_SMTP_USERNAME}'
      - 'NEXT_PRIVATE_SMTP_PASSWORD=${NEXT_PRIVATE_SMTP_PASSWORD}'
      - 'NEXT_PRIVATE_SMTP_FROM_NAME=${NEXT_PRIVATE_SMTP_FROM_NAME:-MyPerformance Dokumenty}'
      - 'NEXT_PRIVATE_SMTP_FROM_ADDRESS=${NEXT_PRIVATE_SMTP_FROM_ADDRESS:-noreply@myperformance.pl}'

      # === Keycloak OIDC SSO ===
      - 'NEXT_PRIVATE_OIDC_PROVIDER_LABEL=MyPerformance ID'
      - 'NEXT_PRIVATE_OIDC_WELL_KNOWN=https://auth.myperformance.pl/realms/MyPerformance/.well-known/openid-configuration'
      - 'NEXT_PRIVATE_OIDC_CLIENT_ID=documenso'
      - 'NEXT_PRIVATE_OIDC_CLIENT_SECRET=${DOCUMENSO_OIDC_CLIENT_SECRET}'
      - 'NEXT_PRIVATE_OIDC_ALLOW_SIGNUP=true'
      - 'NEXT_PRIVATE_OIDC_SKIP_VERIFY=false'
      - 'NEXT_PRIVATE_DISABLE_CREDENTIAL_SIGNIN=true'

      # === Webhook signing ===
      - 'NEXT_PRIVATE_WEBHOOK_SECRET=${DOCUMENSO_WEBHOOK_SECRET}'

      # === Database (fresh na pusty wolumen) ===
      - 'NEXT_PRIVATE_DATABASE_URL=postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@database/documenso?schema=public'
      - 'NEXT_PRIVATE_DIRECT_DATABASE_URL=postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@database/documenso?schema=public'

      # === Signing cert (self-signed, auto-gen) ===
      - NEXT_PRIVATE_SIGNING_TRANSPORT=local
      - NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH=/app/certs/cert.p12
      - 'NEXT_PRIVATE_SIGNING_PASSPHRASE=${SERVICE_PASSWORD_DOCUMENSO}'
      - 'NEXT_PRIVATE_SIGNING_LOCAL_FILE_PASSPHRASE=${SERVICE_PASSWORD_DOCUMENSO}'
      - 'CERT_VALID_DAYS=${CERT_VALID_DAYS:-3650}'
      - 'CERT_INFO_COUNTRY_NAME=${CERT_INFO_COUNTRY_NAME:-PL}'
      - 'CERT_INFO_STATE_OR_PROVIDENCE=${CERT_INFO_STATE_OR_PROVIDENCE:-Slaskie}'
      - 'CERT_INFO_LOCALITY_NAME=${CERT_INFO_LOCALITY_NAME:-Tychy}'
      - 'CERT_INFO_ORGANIZATION_NAME=${CERT_INFO_ORGANIZATION_NAME:-MyPerformance}'
      - 'CERT_INFO_ORGANIZATIONAL_UNIT=${CERT_INFO_ORGANIZATIONAL_UNIT:-Dokumenty}'
      - 'CERT_INFO_EMAIL=${CERT_INFO_EMAIL:-noreply@myperformance.pl}'

      # === Misc ===
      - 'NEXT_PRIVATE_JOBS_PROVIDER=${NEXT_PRIVATE_JOBS_PROVIDER:-local}'
      - 'SERVICE_PASSWORD_DOCUMENSO=${SERVICE_PASSWORD_DOCUMENSO}'
      - PORT=3000
    expose:
      - '3000'
    volumes:
      - 'documenso-certs:/app/certs'
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q -O - http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1'
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 120s
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        CERT_DIR="/app/certs"
        CERT_FILE="$$CERT_DIR/cert.p12"
        mkdir -p "$$CERT_DIR"
        chown -R 1001:65533 "$$CERT_DIR"
        if [ ! -f "$$CERT_FILE" ]; then
          OPENSSL_CMD="$$(command -v openssl || echo /usr/bin/openssl)"
          PASSPHRASE_FILE="/tmp/cert_passphrase"
          printf "%s" "$${NEXT_PRIVATE_SIGNING_LOCAL_FILE_PASSPHRASE}" > "$$PASSPHRASE_FILE"
          chmod 600 "$$PASSPHRASE_FILE"
          cat <<EOF > /tmp/cert_info.cnf
        [ req ]
        distinguished_name = req_distinguished_name
        prompt = no
        [ req_distinguished_name ]
        C            = $${CERT_INFO_COUNTRY_NAME}
        ST           = $${CERT_INFO_STATE_OR_PROVIDENCE}
        L            = $${CERT_INFO_LOCALITY_NAME}
        O            = $${CERT_INFO_ORGANIZATION_NAME}
        OU           = $${CERT_INFO_ORGANIZATIONAL_UNIT}
        CN           = sign.myperformance.pl
        emailAddress = $${CERT_INFO_EMAIL}
        EOF
          "$$OPENSSL_CMD" genrsa -out "$$CERT_DIR/private.key" 2048
          "$$OPENSSL_CMD" req -new -x509 -key "$$CERT_DIR/private.key" -out "$$CERT_DIR/certificate.crt" -days "$${CERT_VALID_DAYS}" -config /tmp/cert_info.cnf
          "$$OPENSSL_CMD" pkcs12 -export -out "$$CERT_FILE" -inkey "$$CERT_DIR/private.key" -in "$$CERT_DIR/certificate.crt" -legacy -passout file:"$$PASSPHRASE_FILE"
          rm -f "$$PASSPHRASE_FILE"
          chown 1001:65533 "$$CERT_DIR"/*
          chmod 400 "$$CERT_DIR"/*
        fi
        if ! command -v su-exec >/dev/null 2>&1; then
          apk add --no-cache su-exec >/dev/null 2>&1 || true
        fi
        if command -v su-exec >/dev/null 2>&1; then
          exec su-exec 1001:65533 ./start.sh
        else
          exec busybox su -s /bin/sh -c "./start.sh" nodejs
        fi
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  database:
    image: 'postgres:17-alpine'
    restart: unless-stopped
    environment:
      - 'POSTGRES_USER=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=documenso
    volumes:
      - 'documenso-postgresql-data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

volumes:
  documenso-certs:
  documenso-postgresql-data:
