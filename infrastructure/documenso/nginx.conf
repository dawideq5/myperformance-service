worker_processes auto;
error_log /dev/stderr notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  upstream documenso_backend {
    server documenso:3000;
    keepalive 16;
  }

  # Redirect the bare local-auth signin page straight into OIDC so users
  # never see the password form. Keep the rest of the app intact.
  map $request_uri $is_signin {
    default 0;
    ~^/signin(\?|/|$) 1;
    ~^/signup(\?|/|$) 1;
  }

  server {
    listen 3000;
    server_name _;

    # Block local auth endpoints entirely — every login must go through OIDC.
    location = /signin {
      return 302 /api/auth/signin/oidc?callbackUrl=/;
    }
    location = /signup {
      return 302 /api/auth/signin/oidc?callbackUrl=/;
    }

    # Strip Documenso admin/branding surfaces we do not expose to regular users.
    # The upstream still serves them, but injected CSS hides their navigation
    # entries so only the sign-documents workflow remains visible.
    sub_filter_types text/html;
    sub_filter_once on;
    sub_filter '</head>' '<style id="myperformance-trim">
      /* Hide non-essential user settings tabs for a document-signer profile */
      a[href$="/settings/document"],
      a[href$="/settings/branding"],
      a[href$="/settings/email"],
      a[href$="/settings/public-profile"],
      a[href$="/settings/tokens"],
      a[href$="/settings/api"],
      a[href$="/settings/webhooks"],
      a[href$="/settings/organisations"],
      a[href$="/settings/organizations"],
      a[href$="/settings/security"] { display: none !important; }
      /* Collapse the sidebar group headers if they become empty */
      nav[aria-label="Settings"] li:empty,
      nav[aria-label="Settings"] ul:empty { display: none !important; }
    </style></head>';

    location / {
      proxy_pass http://documenso_backend;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $http_connection;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_buffering on;
    }
  }
}
