# TODO (network-segmentation §3): migrate
#   web/smtp/worker → mp_auth + mp_data_postal
#   mariadb         → mp_data_postal (internal: true)
# Patrz infrastructure/network-segmentation.md

services:
  # Writes /config/postal.yml from Coolify-managed secrets on every boot.
  # alpine+root avoids perm issues and chmods /config so Postal can drop
  # signing.key etc on first run. Exits 0; main services wait via
  # service_completed_successfully.
  config-init:
    image: 'alpine:3.19'
    user: '0:0'
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -eu
        mkdir -p /config
        chmod 0777 /config
        cat > /config/postal.yml <<EOF
        version: 2
        postal:
          web_hostname: ${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
          web_protocol: https
          smtp_hostname: ${POSTAL_SMTP_HOSTNAME:-postal.myperformance.pl}
        main_db:
          host: mariadb
          port: 3306
          username: postal
          password: ${SERVICE_PASSWORD_MARIADB}
          database: postal
        message_db:
          host: mariadb
          port: 3306
          username: postal
          password: ${SERVICE_PASSWORD_MARIADB}
          prefix: postal
        smtp_server:
          default_bind_address: "0.0.0.0"
        dns:
          mx_records:
            - mx.${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
          spf_include: spf.${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
          return_path_domain: rp.${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
          route_domain: routes.${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
          track_domain: track.${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
        smtp:
          host: 127.0.0.1
          port: 2525
          from_name: Postal
          from_address: no-reply@${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}
        rails:
          secret_key: ${SERVICE_BASE64_128_RAILSSECRET}
        web_server:
          default_bind_address: 0.0.0.0
          default_port: 5000
        oidc:
          enabled: true
          local_authentication_enabled: false
          name: MyPerformance SSO
          issuer: https://auth.myperformance.pl/realms/MyPerformance
          identifier: postal
          secret: ${POSTAL_OIDC_CLIENT_SECRET}
          scopes:
            - openid
            - email
            - profile
          uid_field: sub
          email_address_field: email
          name_field: name
        EOF
        chmod 0666 /config/postal.yml
        echo "[config-init] wrote /config/postal.yml"
    environment:
      - 'POSTAL_WEB_HOSTNAME=${POSTAL_WEB_HOSTNAME:-postal.myperformance.pl}'
      - 'POSTAL_SMTP_HOSTNAME=${POSTAL_SMTP_HOSTNAME:-postal.myperformance.pl}'
      - 'SERVICE_PASSWORD_MARIADB=${SERVICE_PASSWORD_MARIADB}'
      - 'SERVICE_BASE64_128_RAILSSECRET=${SERVICE_BASE64_128_RAILSSECRET}'
      - 'POSTAL_OIDC_CLIENT_SECRET=${POSTAL_OIDC_CLIENT_SECRET}'
    volumes:
      - 'postal-config:/config'
    restart: 'no'
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "128M"
        reservations:
          cpus: "0.25"
          memory: "128M"

  mariadb:
    image: 'mariadb:10.11'
    environment:
      - 'MARIADB_ROOT_PASSWORD=${SERVICE_PASSWORD_MARIADBROOT}'
      - 'MARIADB_DATABASE=postal'
      - 'MARIADB_USER=postal'
      - 'MARIADB_PASSWORD=${SERVICE_PASSWORD_MARIADB}'
    command:
      - '--character-set-server=utf8mb4'
      - '--collation-server=utf8mb4_unicode_ci'
      - '--innodb-flush-log-at-trx-commit=2'
      - '--max-connections=200'
    volumes:
      - 'postal-mariadb-data:/var/lib/mysql'
    healthcheck:
      test: ['CMD-SHELL', 'healthcheck.sh --connect --innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  # One-shot migrator. `postal initialize` creates/updates main_db + message_db schemas.
  migrator:
    image: 'ghcr.io/postalserver/postal:3.3.5'
    command: ['postal', 'initialize']
    depends_on:
      config-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    volumes:
      - 'postal-config:/config'
    restart: 'no'
    # Sidecar one-shot — Rails CLI ładuje pełny stack, więc 512M minimum.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.25"
          memory: "128M"

  # Postal web-server. Service is named `web` because Coolify's FQDN binding
  # (postal.myperformance.pl → web:5000) was established under this name;
  # renaming loses the public hostname binding. Postal's native OIDC handles
  # SSO directly — no oauth2-proxy sidecar needed.
  web:
    image: 'ghcr.io/postalserver/postal:3.3.5'
    command: ['postal', 'web-server']
    depends_on:
      migrator:
        condition: service_completed_successfully
    volumes:
      - 'postal-config:/config'
    expose:
      - '5000'
    healthcheck:
      # Postal enforces Host header (Rails `web_hostname` check). With OIDC
      # enabled + local_auth disabled, `/login` returns 200 (OIDC button page)
      # when reached with proper Host + x-forwarded-proto headers.
      test:
        - 'CMD-SHELL'
        - 'curl -fs -H "Host: postal.myperformance.pl" -H "x-forwarded-proto: https" http://127.0.0.1:5000/login >/dev/null 2>&1 || exit 1'
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  smtp:
    image: 'ghcr.io/postalserver/postal:3.3.5'
    command: ['postal', 'smtp-server']
    depends_on:
      migrator:
        condition: service_completed_successfully
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - '25:25'
      - '465:465'
      - '587:587'
    volumes:
      - 'postal-config:/config'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

  worker:
    image: 'ghcr.io/postalserver/postal:3.3.5'
    command: ['postal', 'worker']
    depends_on:
      migrator:
        condition: service_completed_successfully
    volumes:
      - 'postal-config:/config'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

volumes:
  postal-config:
  postal-mariadb-data:
