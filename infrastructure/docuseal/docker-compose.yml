services:
  docuseal:
    image: 'docuseal/docuseal:latest'
    environment:
      - SERVICE_FQDN_DOCUSEAL_3000=sign.myperformance.pl
      - 'HOST=${SERVICE_URL_DOCUSEAL}'
      - FORCE_SSL=true
      - 'DATABASE_URL=postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/docuseal'
      - 'SECRET_KEY_BASE=${SERVICE_BASE64_64_SECRETKEY}'
      - 'SMTP_ADDRESS=${SMTP_ADDRESS:-}'
      - 'SMTP_PORT=${SMTP_PORT:-587}'
      - 'SMTP_USERNAME=${SMTP_USERNAME:-}'
      - 'SMTP_PASSWORD=${SMTP_PASSWORD:-}'
      - 'SMTP_FROM=${SMTP_FROM:-no-reply@myperformance.pl}'
      - 'SMTP_DOMAIN=${SMTP_DOMAIN:-myperformance.pl}'
    volumes:
      - 'docuseal-data:/data/docuseal'
      - 'docuseal-uploads:/data/uploads'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/up >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 90s
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_USER=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=docuseal
    volumes:
      - 'docuseal-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 10s
      retries: 12
