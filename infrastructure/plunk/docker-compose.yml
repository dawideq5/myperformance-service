services:
  plunk:
    image: 'driaug/plunk:latest'
    environment:
      - SERVICE_FQDN_PLUNK_3000=mail.myperformance.pl
      - 'APP_URI=${SERVICE_URL_PLUNK}'
      - 'API_URI=${SERVICE_URL_PLUNK}'
      - 'NEXT_PUBLIC_APP_URI=${SERVICE_URL_PLUNK}'
      - 'NEXT_PUBLIC_API_URI=${SERVICE_URL_PLUNK}'
      - 'DATABASE_URL=postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/plunk'
      - 'REDIS_URL=redis://:${SERVICE_PASSWORD_REDIS}@redis:6379'
      - 'JWT_SECRET=${SERVICE_BASE64_64_JWTSECRET}'
      - 'API_ENCRYPTION_KEY=${SERVICE_BASE64_32_APIKEY}'
      - 'AWS_REGION=${AWS_REGION:-eu-west-1}'
      - 'AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}'
      - 'AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}'
      - 'AWS_SES_CONFIGURATION_SET=${AWS_SES_CONFIGURATION_SET:-}'
      - 'DISABLE_SIGNUPS=true'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_USER=${SERVICE_USER_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - POSTGRES_DB=plunk
    volumes:
      - 'plunk-postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 10s
      retries: 12
  redis:
    image: 'redis:7-alpine'
    command: 'redis-server --requirepass ${SERVICE_PASSWORD_REDIS} --appendonly yes'
    volumes:
      - 'plunk-redis-data:/data'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $${SERVICE_PASSWORD_REDIS} ping | grep -q PONG']
      interval: 5s
      timeout: 10s
      retries: 12
