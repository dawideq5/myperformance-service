# myperformance.pl mTLS — canonical Traefik dynamic config.
#
# Panele certyfikatowe (sprzedawca/serwisant/kierowca) i wazuh wymagają
# certyfikatu klienckiego — bez wyjątków.
# clientAuthType: RequireAndVerifyClientCert oznacza:
#   - Traefik odrzuca połączenie w TLS handshake gdy klient nie ma certu
#   - Cert musi być podpisany przez myperformance-ca.pem (caFile)
#   - Brak fallback: panele nie są dostępne bez certu (enterprise default)
#
# Edycja tego pliku jest zarządzana ręcznie + sync skrypt z repo. Aby zmienić
# zachowanie mTLS, edytuj ten plik bezpośrednio i Traefik przeładuje (file
# provider watch=true).
http:
  middlewares:
    mtls-required:
      passTLSClientCert:
        pem: true
        info:
          serialNumber: true
          subject:
            commonName: true
            organization: true
            organizationalUnit: true
            serialNumber: true
          issuer:
            commonName: true
          sans: true
          notAfter: true

    # Rate-limit dla Keycloak token endpoint (login + refresh + admin auth).
    # KC ma BFP po 10 failed login attempts, ale Traefik rate-limit chwyta
    # *zanim* request dotrze do KC = lepsza ochrona przed brute force.
    # Per-IP, average=10 req/s, burst=30.
    kc-token-ratelimit:
      rateLimit:
        average: 10
        burst: 30
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Bardziej agresywny limit na same login form submission.
    kc-login-ratelimit:
      rateLimit:
        average: 5
        burst: 10
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Webhook endpoints — Wazuh AR + KC SPI. Webhooks powinny mieć bardzo
    # niski volume; >100 req/min = atak/loop.
    webhook-ratelimit:
      rateLimit:
        average: 100
        burst: 200
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Globalne security headers (defense-in-depth — dashboard ma swoje
    # przez Next.js, ale Traefik łapie też inne usługi typu Postal/Wazuh).
    secure-headers:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        frameDeny: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"

tls:
  options:
    mtls-sprzedawca:
      clientAuth:
        caFiles:
          - /traefik/certs/myperformance-ca.pem
        clientAuthType: RequireAndVerifyClientCert
      minVersion: VersionTLS12
    mtls-serwisant:
      clientAuth:
        caFiles:
          - /traefik/certs/myperformance-ca.pem
        clientAuthType: RequireAndVerifyClientCert
      minVersion: VersionTLS12
    mtls-kierowca:
      clientAuth:
        caFiles:
          - /traefik/certs/myperformance-ca.pem
        clientAuthType: RequireAndVerifyClientCert
      minVersion: VersionTLS12
    mtls-wazuh:
      clientAuth:
        caFiles:
          - /traefik/certs/myperformance-ca.pem
        clientAuthType: RequireAndVerifyClientCert
      minVersion: VersionTLS12
