# coturn config — turn.myperformance.pl
#
# Reference: https://github.com/coturn/coturn/blob/master/examples/etc/turnserver.conf
# LiveKit guide: https://docs.livekit.io/realtime/self-hosting/deployment/#turn-server
#
# UWAGA: ten plik jest TEMPLATKĄ. Produkcja MUSI nadpisać następujące
# pola przez bind-mount na VPS-ie (Coolify nie wstrzykuje env do
# turnserver.conf — coturn config nie wspiera $VAR substitution natywnie):
#
#   external-ip = <VPS public IPv4>
#   user        = <LIVEKIT_TURN_USER>:<LIVEKIT_TURN_PASSWORD>
#
# Skrypt deploy:
#   ssh root@<vps>
#   sed -i "s/EXTERNAL_IP_PLACEHOLDER/$VPS_IP/" /opt/myperformance/coturn/turnserver.conf
#   sed -i "s/TURN_USER_PLACEHOLDER/$LIVEKIT_TURN_USER/" /opt/myperformance/coturn/turnserver.conf
#   sed -i "s/TURN_PASS_PLACEHOLDER/$LIVEKIT_TURN_PASSWORD/" /opt/myperformance/coturn/turnserver.conf
#   docker restart coturn-<hash>

# === Listening ports ===
listening-port=3478
tls-listening-port=5349

# === Listening interfaces ===
# `network_mode: host` — coturn binduje na wszystkie interfejsy hosta.
# Bez `listening-ip` (komentarz) coturn auto-detekuje wszystkie IP.
# listening-ip=0.0.0.0

# === External IP (CRITICAL) ===
# Public IP VPS-a. Bez tego klienci dostaną w SDP candidate adresy LAN-owe
# i połączenie nie zestawi się z internetu.
external-ip=EXTERNAL_IP_PLACEHOLDER

# === Relay range ===
# Porty wykorzystywane do relay'owania pakietów między klientem a peerem.
# Każdy peer pair używa pary portów. ~40 portów = ~20 jednoczesnych sesji TURN.
min-port=49160
max-port=49200

# === Authentication (long-term credential mechanism) ===
# LiveKit wystawia klientom pojedynczą parę user:password (z access tokena).
# To NIE są credentials per-user dashboardu — to wspólny secret coturn↔LiveKit.
lt-cred-mech

# Realm — używane w hash credentialu (musi być spójne między LiveKitem a tu).
realm=myperformance.pl

# Static user (single shared credential).
# UWAGA: `user=USER:PASSWORD` jest plain-text w configu. Plik MUSI być
# czytalny tylko dla roota / coturn user (chmod 600).
user=TURN_USER_PLACEHOLDER:TURN_PASS_PLACEHOLDER

# === TLS ===
# Cert dla `turn.myperformance.pl` — Let's Encrypt (DNS-01 przez OVH API)
# lub kopia z Traefika (`/data/coolify/proxy/certs/...`). Patrz README.md.
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Wymuszamy TLS 1.2+, wyłączamy słabe cipher suite'y.
no-tlsv1
no-tlsv1_1
cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!DSS"

# DH params (wygenerowane przez `openssl dhparam -out dhparam.pem 2048`,
# kopiowane na host razem z certyfikatem).
dh-file=/etc/coturn/certs/dhparam.pem

# === Hardening ===
# Wyłącz CLI (admin telnet) — niepotrzebne, vector ataku.
no-cli

# Wyłącz multi-tenant (relacje z bazą). Mamy single shared credential.
no-multicast-peers

# Tylko TURN-y na real interfaces — bez LAN/loopback delegate.
no-loopback-peers

# Blokuj relay do prywatnych zakresów IP (ataki SSRF / lateral movement
# z TURN-a do wewnętrznej sieci). LiveKit nie potrzebuje relay'ów do LAN.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# Limit concurrent allocations per username (anti-abuse).
user-quota=12
total-quota=1200

# === Logging ===
log-file=/var/lib/coturn/turn.log
verbose
# `simple-log` — jeden plik (bez rotacji per-pid). Logrotate na hoście.
simple-log

# === Misc ===
# coturn nadaje kanały TURN dla every connection — może wymagać dużej
# liczby fd (default `ulimit -n` 1024 to mało). Coolify image ma podniesione.
no-stdout-log
syslog
