services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: myperformance_dashboard_dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/MyPerformance
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8080
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: myperformance_keycloak_dev
    command: start-dev --import-realm
    env_file:
      - .env
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-keycloak:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_IMPORT_STRATEGY=OVERWRITE_EXISTING
      - KC_HEALTH_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    depends_on:
      - postgres-keycloak

  postgres-keycloak:
    image: postgres:15-alpine
    container_name: myperformance_postgres_keycloak_dev
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
