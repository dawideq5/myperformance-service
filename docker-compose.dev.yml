############################################
# Lokalne usługi do dev (minimalna wersja)
#
# Uruchamia tylko bazę danych — dashboard i panele
# działają przez `npm run dev:hybrid` (lokalny hot-reload
# z połączeniem do zdalnych usług na serwerze).
#
# Uruchomienie:
#   docker compose -f docker-compose.dev.yml up -d
#   npm run dev:hybrid
#
# Jeśli potrzebujesz pełnego stack lokalnie (offline):
#   docker compose -f docker-compose.dev.full.yml up -d --build
############################################

services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: myperformance_postgres_dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: myperformance_dev
      POSTGRES_USER: mp_dev
      POSTGRES_PASSWORD: mp_dev_local
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mp_dev -d myperformance_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
