############################################
# Local development stack.
#
# Brings up Keycloak (with realm import), all four panels (sprzedawca /
# serwisant / kierowca / dokumenty) and the main dashboard on separate
# localhost ports. Client-certificate verification is enforced only at
# the production Traefik edge — this compose file bypasses that layer
# so you can iterate on any panel without a browser cert.
#
# Ports (matched to redirectUris in infrastructure/keycloak/realm.json):
#   dashboard   : 3000
#   sprzedawca  : 3001
#   serwisant   : 3002
#   kierowca    : 3003
#   dokumenty   : 3004
#   keycloak    : 8080
#
# Required env file: .env with NEXTAUTH_SECRET, KEYCLOAK_CLIENT_SECRET,
# KEYCLOAK_SERVICE_CLIENT_SECRET, PANEL_*_CLIENT_SECRET, DOCUSEAL_URL,
# DOCUSEAL_API_KEY, DOCUSEAL_WEBHOOK_SECRET.
#
# Run:   docker compose -f docker-compose.dev.yml up -d --build
############################################

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: myperformance_dashboard_dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=http://localhost:3000
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/MyPerformance
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8080
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  panel-sprzedawca:
    build:
      context: ./panels/sprzedawca
      dockerfile: Dockerfile
    container_name: myperformance_panel_sprzedawca_dev
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=http://localhost:3001
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/MyPerformance
      - KEYCLOAK_CLIENT_ID=panel-sprzedawca
      - KEYCLOAK_CLIENT_SECRET=${PANEL_SPRZEDAWCA_CLIENT_SECRET}
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  panel-serwisant:
    build:
      context: ./panels/serwisant
      dockerfile: Dockerfile
    container_name: myperformance_panel_serwisant_dev
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=http://localhost:3002
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/MyPerformance
      - KEYCLOAK_CLIENT_ID=panel-serwisant
      - KEYCLOAK_CLIENT_SECRET=${PANEL_SERWISANT_CLIENT_SECRET}
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  panel-kierowca:
    build:
      context: ./panels/kierowca
      dockerfile: Dockerfile
    container_name: myperformance_panel_kierowca_dev
    ports:
      - "3003:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=http://localhost:3003
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/MyPerformance
      - KEYCLOAK_CLIENT_ID=panel-kierowca
      - KEYCLOAK_CLIENT_SECRET=${PANEL_KIEROWCA_CLIENT_SECRET}
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  panel-dokumenty:
    build:
      context: ./panels/dokumenty
      dockerfile: Dockerfile
    container_name: myperformance_panel_dokumenty_dev
    ports:
      - "3004:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=http://localhost:3004
      - KEYCLOAK_ISSUER=http://keycloak:8080/realms/MyPerformance
      - KEYCLOAK_CLIENT_ID=panel-dokumenty
      - KEYCLOAK_CLIENT_SECRET=${PANEL_DOKUMENTY_CLIENT_SECRET}
      - KEYCLOAK_SERVICE_CLIENT_ID=${KEYCLOAK_SERVICE_CLIENT_ID}
      - KEYCLOAK_SERVICE_CLIENT_SECRET=${KEYCLOAK_SERVICE_CLIENT_SECRET}
      - DOCUSEAL_URL=${DOCUSEAL_URL}
      - DOCUSEAL_API_KEY=${DOCUSEAL_API_KEY}
      - DOCUSEAL_WEBHOOK_SECRET=${DOCUSEAL_WEBHOOK_SECRET}
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: myperformance_keycloak_dev
    command: start-dev --import-realm
    env_file:
      - .env
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-keycloak:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
      - KC_SSL_REQUIRED=none
      - KC_IMPORT_STRATEGY=OVERWRITE_EXISTING
      - KC_HEALTH_ENABLED=true
      - GOOGLE_IDP_CLIENT_ID=${GOOGLE_IDP_CLIENT_ID}
      - GOOGLE_IDP_CLIENT_SECRET=${GOOGLE_IDP_CLIENT_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
      - ./build_keycloak/theme:/opt/keycloak/themes:ro
    depends_on:
      - postgres-keycloak

  postgres-keycloak:
    image: postgres:15-alpine
    container_name: myperformance_postgres_keycloak_dev
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
